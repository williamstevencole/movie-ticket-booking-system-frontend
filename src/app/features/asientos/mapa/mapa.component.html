<main class="page">

    <section class="booking-layout">

        <!-- LEFT SIDE -->
        <aside class="checkout-side">

            <header class="header">

                <h1>
                    Elige tus asientos
                </h1>

                <p>
                    Función
                    <strong>{{ funcionId() }}</strong>
                </p>

            </header>


            <app-panel-lateral [asientosSeleccionados]="asientosSeleccionados()">
            </app-panel-lateral>



        </aside>

        <!-- RIGHT SIDE -->

        <section class="cinema-area">



            <section class="cinema-screen">

                <div class="screen"></div>

                <span>
                    PANTALLA
                </span>

            </section>



            <section class="container_map">



                <section class="seat-map">


                    @for (fila of filas(); track fila) {


                    <div class="row">


                        <span class="row-label">
                            {{ fila }}
                        </span>
                        <div class="seats">

                            @for (asiento of asientosPorFila(fila); track asiento.id) {

                            <button class="seat" (click)="toggleAsiento(asiento)"
                                [class.available]="asiento.estado === 'disponible'"
                                [class.occupied]="asiento.estado === 'ocupado'"
                                [class.selected]="asiento.estado === 'seleccionado'" [class.hidden-seat]="
                asiento.estado === 'bloqueado' ||
                asiento.estado === 'reservado'
            ">
                                {{ asiento.numero }}
                            </button>

                            }

                        </div>


                    </div>


                    }


                </section>

                @if(mostrarError()) {

                <app-seat-error [asiento]="asientoConflicto()">
                </app-seat-error>

                }

                <!-- LEYENDA -->

                <section class="legend">

                    <!---para testing!!!!!-->
                    <!---<button class="refresh-button" (click)="simularCambio()">
                        🔄 Simular actualización
                    </button> -->

                    <div class="legend-item">

                        <span class="box available"></span>

                        Disponible

                    </div>



                    <div class="legend-item">

                        <span class="box occupied"></span>

                        Ocupado

                    </div>




                    <div class="legend-item">

                        <span class="box selected"></span>

                        Seleccionado

                    </div>



                </section>

            </section>


        </section>


    </section>


</main>
