<main class="page">

    <app-stepper class="dark-stepper"></app-stepper>


    <section class="booking-layout">


        <!-- LEFT SIDE -->
        <aside class="checkout-side">
            

            <app-panel-lateral [asientosSeleccionados]="asientosSeleccionados()">
            </app-panel-lateral>

        </aside>

        <!-- RIGHT SIDE -->

        <section class="cinema-area">

            <section class="cinema-screen">

                <div class="screen"></div>

                <span>
                    PANTALLA
                </span>

            </section>

            <section class="container_map">

                <section class="seat-map">


                    @for (fila of filas(); track fila) {


                    <div class="row">


                        <span class="row-label">
                            {{ fila }}
                        </span>
                        <div class="seats">

                            @for (asiento of asientosPorFila(fila); track asiento.id) {

                            <button class="seat" [title]="asiento.estado === 'bloqueado' ? 'Asiento no disponible' : ''"
                                [class.vip]="asiento.tipo === 'vip'" [class.accessible]="asiento.tipo === 'accesible'"
                                [class.available]="asiento.estado === 'disponible'"
                                [class.occupied]="asiento.estado === 'ocupado'"
                                [class.selected]="asiento.estado === 'seleccionado'"
                                [class.blocked]="asiento.estado === 'bloqueado'" (click)="toggleAsiento(asiento)">

                                @if (asiento.tipo === 'vip') {
                                <span class="seat-icon">★</span>
                                }

                                @if (asiento.tipo === 'accesible') {
                                <span class="seat-icon">♿︎</span>
                                }

                                <span class="number">
                                    {{ asiento.numero }}
                                </span>

                            </button>

                            }

                        </div>


                    </div>


                    }


                </section>

                @if(mostrarError()) {

                <app-seat-error [asiento]="asientoConflicto()">
                </app-seat-error>

                }

                <!-- LEYENDA -->

                <section class="legend">

                    <!---para testing!!!!!-->
                    <!---<button class="refresh-button" (click)="simularCambio()">
                        🔄 Simular actualización
                    </button> -->

                    <div class="legend-item">

                        <span class="box available"></span>

                        Disponible

                    </div>



                    <div class="legend-item">

                        <span class="box occupied"></span>

                        Ocupado

                    </div>




                    <div class="legend-item">

                        <span class="box selected"></span>

                        Seleccionado

                    </div>

                    <div class="legend-item">

                        <span class="box vip">★</span>

                        VIP L180

                    </div>


                    <div class="legend-item">

                        <span class="box accessible">
                            ♿︎
                        </span>

                        Accesible L90

                    </div>


                    <div class="legend-item">

                        <span class="box blocked">
                        </span>

                        Bloqueado

                    </div>

                </section>

            </section>


        </section>


    </section>


</main>
