<div class="overlay" role="alert">
  <div class="alert-banner warn floating">
    <div class="ico">⚠</div>
    <div class="msg">
      El asiento <strong>{{ asiento }}</strong> acaba de tomarse por otro usuario.
      Selecciona otro.
    </div>
    <button type="button" class="close" (click)="cerrar.emit()" aria-label="Cerrar">×</button>
  </div>
</div>
