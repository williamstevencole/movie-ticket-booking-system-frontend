<div class="stepper">
  @for (step of steps; track step.id) {
    <div
      class="step"
      [class.done]="getStatus(step) === 'done'"
      [class.now]="getStatus(step) === 'current'"
    >
      <span class="n">
        @if (getStatus(step) === 'done') { ✓ }
        @else { {{ step.id }} }
      </span>
      <div class="text">
        <div class="lbl">PASO {{ step.id }}</div>
        <div class="ttl">{{ step.label }}</div>
      </div>
    </div>
  }
</div>
