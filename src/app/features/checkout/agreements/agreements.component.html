<div class="form-card">
  <div class="head">
    <span class="num">3</span>
    <div>
      <h3>Te enviamos el boleto</h3>
      <p class="sub">Confirma los términos antes de pagar.</p>
    </div>
  </div>
  <div class="body">
    <label class="agreement">
      <input
        type="checkbox"
        [checked]="aceptaPolitica()"
        (change)="onPolitica($any($event.target).checked)"
      />
      <span>
        Acepto la <a href="#" (click)="$event.preventDefault()">política de cancelación de {{ cinema }}</a>
        y los términos y condiciones.
      </span>
    </label>
    <label class="agreement opt">
      <input
        type="checkbox"
        [checked]="quiereRecordatorios()"
        (change)="onRecordatorios($any($event.target).checked)"
      />
      <span>Quiero recibir recordatorios por correo el día de mi función.</span>
    </label>
  </div>
</div>
