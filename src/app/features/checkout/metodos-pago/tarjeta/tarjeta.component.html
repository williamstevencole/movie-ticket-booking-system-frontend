<div class="tarjeta-form">
  <div class="field">
    <label>Número de tarjeta</label>
    <input type="text" placeholder="1234 5678 9012 3456" inputmode="numeric" maxlength="19" />
  </div>
  <div class="row">
    <div class="field">
      <label>Expiración</label>
      <input type="text" placeholder="MM/AA" maxlength="5" />
    </div>
    <div class="field">
      <label>CVV</label>
      <input type="text" placeholder="123" maxlength="4" inputmode="numeric" />
    </div>
  </div>
  <div class="field">
    <label>Nombre del titular</label>
    <input type="text" placeholder="Como aparece en la tarjeta" />
  </div>
</div>
