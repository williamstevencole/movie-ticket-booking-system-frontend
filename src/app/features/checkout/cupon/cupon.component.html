<div class="coupon">

    <h2>
        Cupón de descuento
    </h2>


    <div class="coupon-row">

        <input
            #inputCupon
            placeholder="Ingresa tu cupón"
            (input)="codigo.set(inputCupon.value)"
        />


        <button (click)="aplicar()">
            Aplicar
        </button>

    </div>


    @if(descuento() > 0) {

    <p class="success">
        Cupón aplicado: {{ descuento() }}%
    </p>

    }

</div>
