@if(tiempo()) {


    @if(variante === 'pill') {

        <span class="pill" [class]="clase()">

            <span class="dot"></span>

            {{ tiempo() }}

        </span>

    }


    @if(variante === 'banner') {

        <div class="banner">

            <span>
                ⏱
            </span>


            <p>
                {{ tiempo() }} es su función.
            </p>

        </div>

    }


}
