@if (downloadUrl()) {
  <a class="download" [href]="downloadUrl()" [download]="fileName()" target="_blank" rel="noopener">
    <svg class="ico" viewBox="0 0 16 16" aria-hidden="true">
      <path d="M8 2v8m0 0L4.5 6.5M8 10l3.5-3.5" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"></path>
      <path d="M2.5 11.5v1.5c0 .55.45 1 1 1h9c.55 0 1-.45 1-1v-1.5" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"></path>
    </svg>
    <span>Descargar PDF</span>
  </a>
} @else {
  <button type="button" class="download" disabled>
    <svg class="ico" viewBox="0 0 16 16" aria-hidden="true">
      <circle cx="8" cy="8" r="6" fill="none" stroke="currentColor" stroke-width="1.4" opacity="0.4"></circle>
    </svg>
    <span>Preparando…</span>
  </button>
}
