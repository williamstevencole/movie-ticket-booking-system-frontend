<section class="hero">
  <div class="hero-slide">
    @let s = slides[index()];

    <div class="hero-info">
      <span class="hero-badge">
        <svg lucideStar [size]="14"></svg>
        {{ s.tag === "estreno" ? "ESTRENO HOY" : "DESTACADA" }}
      </span>

      <h1>{{ s.titulo }}</h1>

      <div class="hero-meta">
        <span>{{ s.genero }}</span>
        <span class="sep">·</span>
        <span>{{ s.duracion }}</span>
        <span class="sep">·</span>
        <span>{{ s.idioma }}</span>
        <span class="sep">·</span>
        <span class="rating">
          <svg lucideStar [size]="14" class="star-fill"></svg>
          {{ s.rating }} / 5
        </span>
      </div>

      <p class="hero-desc">{{ s.desc }}</p>

      <div class="hero-cta">
        <button class="btn btn-primary btn-lg">Comprar boletos</button>
      </div>
    </div>

    <div class="hero-poster" [ngClass]="s.poster">
      <span class="poster-badge">{{ s.tag.toUpperCase() }}</span>
    </div>
  </div>

  <div class="hero-dots">
    @for (slide of slides; track slide.titulo; let i = $index) {
      <span class="d" [class.on]="i === index()" (click)="index.set(i)"></span>
    }
  </div>

  <button class="arrow-btn arrow-prev" (click)="prev()">
    <svg lucideChevronLeft [size]="20"></svg>
  </button>
  <button class="arrow-btn arrow-next" (click)="next()">
    <svg lucideChevronRight [size]="20"></svg>
  </button>
</section>
